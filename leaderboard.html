<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leaderboard - Arcade</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #f7e6f9 0%, #d0c3f7 50%, #a9d0f7 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 12px rgba(195, 169, 247, 0.3);
      z-index: 10;
    }

    .site-title {
      font-size: 26px;
      font-weight: bold;
      color: #4a2a5b;
      text-shadow: 1px 1px 4px #f7d6f2;
    }

    .home-link {
      font-size: 30px;
      background: linear-gradient(90deg, #b3c7f7 0%, #f7b5d1 100%);
      color: #4a2a5b;
      border-radius: 50%;
      padding: 0;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 4px 12px #c6a1f7;
      transition: background 0.3s, transform 0.2s;
    }

    .home-link:hover {
      background: linear-gradient(90deg, #f7b5d1 0%, #b3c7f7 100%);
      transform: scale(1.05);
    }

    .leaderboard-container {
      margin-top: 100px;
      background: rgba(255, 255, 255, 0.85);
      border: 4px solid #c3a9f7;
      border-radius: 32px;
      padding: 40px;
      width: 90%;
      max-width: 800px;
      box-shadow: 0 8px 32px rgba(195, 169, 247, 0.4);
      animation: fadeInUp 1s ease;
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    h2 {
      text-align: center;
      color: #4a2a5b;
      font-size: 28px;
      text-shadow: 1px 1px 4px #f7d6f2;
      margin-bottom: 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 18px;
      color: #4a2a5b;
    }

    th, td {
      padding: 14px;
      border-bottom: 2px solid #d8c3f7;
      text-align: center;
    }

    th {
      background-color: #e6d4fb;
      border-radius: 16px 16px 0 0;
    }

    tr:nth-child(even) {
      background-color: #f5ecff;
    }

    tr:hover {
      background-color: #e0d4ff;
    }

    @media (max-width: 600px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }

      th {
        display: none;
      }

      td {
        padding: 12px;
        border: none;
        position: relative;
        padding-left: 50%;
        text-align: left;
      }

      td::before {
        content: attr(data-label);
        position: absolute;
        left: 12px;
        font-weight: bold;
        color: #6a3c8c;
      }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="site-title">🎮 Arcade</div>
    <a href="home.html" class="home-link">🏠</a>
  </div>

  <div class="leaderboard-container">
    <h2>Leaderboard</h2>
    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Player</th>
          <th>Score</th>
          <th>Game</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td data-label="Rank">1</td>
          <td data-label="Player">Rud</td>
          <td data-label="Score">9200</td>
          <td data-label="Game">Tic Tac Toe</td>
        </tr>
        <tr>
          <td data-label="Rank">2</td>
          <td data-label="Player">Sabee</td>
          <td data-label="Score">8800</td>
          <td data-label="Game">Rock Paper Scissors</td>
        </tr>
        <tr>
          <td data-label="Rank">3</td>
          <td data-label="Player">Priya</td>
          <td data-label="Score">8500</td>
          <td data-label="Game">Memory Card Game</td>
        </tr>
      </tbody>
    </table>
  </div>

</body>
</html>
